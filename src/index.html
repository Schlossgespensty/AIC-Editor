<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIC Editor</title>
<style>

* {
  box-sizing: border-box;
}

body { 
  font-family: monospace, sans-serif;
  font-size: medium;
  background:#1e1e1e; 
  color:#eee; 
  min-width: 500px;}

#form {
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.topbar,
#form {
  max-width: 700px;
  margin: 0 auto;
  width: 100%;
}

.topbar {
  margin-bottom: 10px;
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #2a2a2a;
  padding: 5px;
  padding-inline: 10px;
  border-bottom: 3px solid #444;
}

.sectionButtonsWrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

sectionButton { 
  background: #444;
  color: white;
  padding: 1px 6px;
  border-radius: 4px;
  min-width: 115px;
  border:none;
  cursor:pointer;
  font-family: monospace, sans-serif;
  font-size: 12px;
}

.sectionButtons {
  display: flex;
  justify-content: left;
  text-align: center;
  margin-inline: 5px;
  margin-top: 2px;
  margin-bottom: 2px;
  gap: 10px;
}

.templateButtons {
  display: flex;
  justify-content: right;
  text-align: center;
  margin-inline: 5px;
  margin-top: 2px;
  margin-bottom: 2px;
  gap: 10px;
}

.templateBtn {
  all: unset;
  cursor: pointer;
  font-family: monospace, sans-serif;
  font-size: 12px;
  color: white;
  padding: 1px 6px;
  border-radius: 4px;
  min-width: 115px;
  border:none;
  background:none; 
}

button.active {
  background: #444;
  color: white;
}

button { 
  background:#3a7bd5; 
  color:white; 
  border:none; 
  padding: 6px 10px; 
  border-radius: 6px; 
  margin-top: 6px; 
  margin-inline: 10px;
  cursor:pointer; 
  min-width: 140px;
  min-height: 32px;
  font-family: monospace, sans-serif;
  font-size: 15px;
}

.buttons {
  width: 100%;
  max-width: 700px;
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  margin-bottom: 10px;
}

.toggles {
  display: flex;
  justify-content: center;
  column-gap: 35px;
  margin-top: 10px;
  margin-bottom: 20px;
  width: 100%;
  flex-wrap: wrap;
}

.toggles label {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  margin-left: 25px;
  margin-right: 30px;
  font-family: monospace, sans-serif;
  font-size: 15px;
}

.toggleItem {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.toggleItem span {
  white-space: nowrap;
}

.toggleItem input {
  margin: 0;
}

.search {
  width: 100%;
  max-width: 700px;
  min-height: 25px;
  display: block;
  margin: 5px 0;
  font-size: 15px;
}

.field {  
  display: grid;
  grid-template-columns: minmax(200px, 1fr) 200px 30px;
  align-items: center;
  gap: 8px;
  margin-top: 0px;
  max-width: 700px;
  min-height: 26px; 
  width: 100%;
  border-radius: 5px; 
  font-family: monospace;
  font-size: 15px;
}

.field span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.field:nth-of-type(odd) { background:#2f2f2f; }
.field:nth-of-type(even) { background:#262626; }

.sectionDivider {
  border-top: 3px solid #555;
  margin-top: 4px;
  padding-top: 5px;
}

details { 
  margin-bottom: 10px; 
  border: 1px solid #444; 
  border-radius: 5px; 
  background: #2a2a2a;
}

summary { 
  font-weight: bold; 
  cursor: pointer; 
  padding: 6px;
  padding-inline: 10px;
  font-size: 17px;
}

details > *:not(summary) {
  padding: 0 10px 0px 10px;
}

select, input { 
  background:#111; 
  color:#eee; 
  border:2px solid #555; 
  height: 23px;  
  border-radius:5px; 
  padding-left:5px; 
  width: 100%;
  box-sizing: border-box;
  font-family: monospace;
  font-size: 15px;
  vertical-align: middle;
}

.helpBtn { 
  margin-left: 2px; 
  cursor:pointer; 
  background:#555; 
  border-radius:50%; 
  width:20px; 
  height:20px; 
  display:flex; 
  align-items:center; 
  justify-content:center;
  font-family: Arial, Helvetica, sans-serif;
}

.helpButtonWrap {
  display: flex;
  justify-content: center;
}

.helpBox {
  background: #262626;
  padding: 15px;
  border-radius: 10px;
  width: 90%;
  max-width: 650px;
  color: #eee;

  display: flex;
  flex-direction: column;
  gap: 15px;
}

.helpText {
  line-height: 1.4;
  background: #2f2f2f;
  padding: 10px;
  border-radius: 10px;
  font: message-box;
  font-family: monospace, sans-serif;
  font-size: 15px;
}

.helpBox button {
  border: none;
}

.helpOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

</style>
</head>

<body>

<div class="topbar">

  <div id="filePath" style="font-size:12px; color:#aaa; text-align:left;"></div>

  <div class="buttons">
    <button onclick="loadFile()">Load Character</button>
    <button onclick="saveFile()">Save as</button>
    <button id="saveBtn" onclick="quickSaveFile()">Save Character</button>
  </div>

 <div class="toggles">
  <label><input type="checkbox" id="toggleOx" checked> Include AI Oxtethers</label>
  <label><input type="checkbox" id="toggleRun" checked> Include Running Units</label>
</div>

<input type="text" id="search" class="search" placeholder="Search..." oninput="search(this.value)">

<div class="sectionButtonsWrapper">
  <div class="sectionButtons">
    <sectionButton onclick="expandAll()">Expand All</sectionButton>
    <sectionButton onclick="collapseAll()">Collapse All</sectionButton>
  </div>

  <div class="templateButtons">
      <button id="btnStandard" class="templateBtn" onclick="standardTemplate()">Standard Template</button>
      <button id="btnOrdered" class="templateBtn" onclick="orderedTemplate()">Ordered Template</button>
  </div> 
</div>

</div>

<div class="infobar">



  </div>

<div id="form"></div>



 <script>
async function loadConfig(name) {
  return await window.electronAPI.loadConfig(name);
}


let helpTexts;
let fieldPools;
let optionPools;
let numericBooleanFields;
let legacyKeyMap;

let template;
let groupBreaks;
let sections;

let templateOrdered;
let groupBreaksOrdered;
let sectionsOrdered

let activeTemplate;
let activeGroupBreaks;
let activeSections;

async function init() {
  try {
    template = await loadConfig("template.json");
    helpTexts = await loadConfig("helpTexts.json");
    fieldPools = await loadConfig("fieldPools.json");
    optionPools = await loadConfig("optionPools.json");
    groupBreaks = await loadConfig("groupBreaks.json");
    numericBooleanFields = await loadConfig("numericBooleanFields.json");
    legacyKeyMap = await loadConfig("legacyKeyMap.json");
    sections = await loadConfig("sections.json");
    templateOrdered = await loadConfig("templateOrdered.json");
    groupBreaksOrdered = await loadConfig("groupBreaksOrdered.json");
    sectionsOrdered = await loadConfig("sectionsOrdered.json");

    data = JSON.parse(JSON.stringify(template));

    activeTemplate = template;
    activeGroupBreaks = groupBreaks;
    activeSections = sections;

    setActiveTemplateButton("standard");

    render();
  } catch (e) {
    console.error("INIT FAILED:", e);
    alert("Failed to load config files.");
  }
}



init();

function standardTemplate() {
  activeTemplate = template;
  activeGroupBreaks = groupBreaks;
  activeSections = sections;

  setActiveTemplateButton("standard");

  data = applyTemplateOrder(activeTemplate, data);
  render();
}

function orderedTemplate() {
  activeTemplate = templateOrdered;
  activeGroupBreaks = groupBreaksOrdered;
  activeSections = sectionsOrdered;

  setActiveTemplateButton("ordered");

  data = applyTemplateOrder(activeTemplate, data);
  render();
}

function setActiveTemplateButton(type) {
  const standardBtn = document.getElementById("btnStandard");
  const orderedBtn = document.getElementById("btnOrdered");

  standardBtn.classList.remove("active");
  orderedBtn.classList.remove("active");

  if (type === "standard") {
    standardBtn.classList.add("active");
  } else {
    orderedBtn.classList.add("active");
  }
}

let searchQuery = "";
document.getElementById("search").oninput = (e)=>{
  searchQuery = e.target.value.toLowerCase();
  render();
};

let currentFilePath = null;

function showHelp(content) {
  const overlay = document.createElement("div");
  overlay.className = "helpOverlay";

  const box = document.createElement("div");
  box.className = "helpBox";

  const text = document.createElement("div");
  text.className = "helpText";
  text.innerHTML = content;

  const close = document.createElement("button");
  close.textContent = "Close";

  const buttonWrap = document.createElement("div");
  buttonWrap.className = "helpButtonWrap";
  buttonWrap.appendChild(close);

  box.appendChild(text);
  box.appendChild(buttonWrap);
  close.onclick = () => document.body.removeChild(overlay);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function mergeDefaults(target, source) {
  for (let key in source) {
    if (target[key] === undefined) {
      target[key] = JSON.parse(JSON.stringify(source[key]));
    } else if (
      typeof source[key] === "object" &&
      source[key] !== null &&
      typeof target[key] === "object"
    ) {
      mergeDefaults(target[key], source[key]);
    }
  }
}

function createField(key, value, parent) {
  if (searchQuery && !key.toLowerCase().includes(searchQuery)) return null;

  const div = document.createElement("div");
  div.className = "field";
 if (!searchQuery && activeGroupBreaks.includes(key)) {
  div.classList.add("sectionDivider");
}
 
  const label = document.createElement("span");

  if (searchQuery) {
    const idx = key.toLowerCase().indexOf(searchQuery);
    if (idx !== -1) {
      label.innerHTML = key.substring(0, idx) +
        "<span style='color:#4da3ff'>" + key.substring(idx, idx + searchQuery.length) + "</span>" +
        key.substring(idx + searchQuery.length);
    } else label.textContent = key;
  } else label.textContent = key;

  div.appendChild(label);

  let input;

if (numericBooleanFields.includes(key)) {
  input = document.createElement("select");

  ["True", "False"].forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.text = v;

    if ((value === 1 && v === "True") || (value === 0 && v === "False")) {
      o.selected = true;
    }

    input.appendChild(o);
  });

  input.onchange = () => {
    parent[key] = (input.value === "True") ? 1 : 0;
  };
}


else if (typeof value === "number") {
  input = document.createElement("input");
  input.type = "text";

  const isDecimal = key === "StrengthMultiplier";

  input.value = value;

  input.oninput = () => {

    let val = input.value;

val = val.replace(/[^0-9.-]/g, "");

if (val.includes("-")) {
  val = val.replace(/-/g, "");
  val = "-" + val; 
}

if (isDecimal) {
  const firstDot = val.indexOf(".");
  if (firstDot !== -1) {
    val =
      val.substring(0, firstDot + 1) +
      val.substring(firstDot + 1).replace(/\./g, "");
  }
} else {

  val = val.replace(/\./g, "");
}

if (val === "-.") {
  val = "-0.";
}

if (val.startsWith(".")) {
  val = "0" + val;
}

if (val !== input.value) {
  input.value = val;
}
  };

  input.onblur = () => {
  let val = input.value;

  if (isDecimal) {
    const num = parseFloat(val);
    if (!isNaN(num)) {
      parent[key] = num;
      input.value = num;
    } else {
      input.value = parent[key];
    }
  } else {
    const num = parseInt(val);
    if (!isNaN(num)) {
      parent[key] = num;
      input.value = num;
    } else {
      input.value = parent[key];
    }
  }
};
}

  else if (fieldPools[key]) {
    input = document.createElement("select");
    optionPools[fieldPools[key]].forEach(v => {
      const o = document.createElement("option");
      o.value = v;
      o.text = v;
      if (v === value) o.selected = true;
      input.appendChild(o);
    });
    input.onchange = () => parent[key] = input.value;
  }
  else {
    input = document.createElement("input");
    input.type = "text";
    input.value = value;
    input.onchange = () => parent[key] = input.value;
  }

  div.appendChild(input);

  const help = document.createElement("div");
  help.className = "helpBtn";
  help.textContent = "?";
  help.onclick = () => showHelp((helpTexts[key] || "No description yet."));

  div.appendChild(help);

  return div;
}

function buildSection(title, keys, source, container) {
  const sec = document.createElement("details");
  if (searchQuery) sec.open = true;
  const sum = document.createElement("summary");
  sum.textContent = title;
  sec.appendChild(sum);

  keys.forEach(k=>{
    if(source[k]!==undefined){
      sec.appendChild(createField(k, source[k], source));
    }
  });

  container.appendChild(sec);
}

function flattenObject(obj, result = [], parent = null, path = "") {
  for (let key in obj) {
    if (key === "aic") continue;

    const value = obj[key];
    const currentPath = path ? `${path}.${key}` : key;

    if (typeof value === "object" && value !== null) {
      flattenObject(value, result, value, currentPath);
    } else {
      result.push({
        key,
        value,
        parent,
        path: currentPath
      });
    }
  }

  if (obj.aic) {
    flattenObject(obj.aic, result, obj.aic, path ? `${path}.aic` : "aic");
  }

  return result;
}

function buildForm(obj, container) {
  const flat = flattenObject(obj);

  let currentSection = null;

  function startSection(title) {
    const sec = document.createElement("details");
    sec.open = !!searchQuery;

    const sum = document.createElement("summary");
    sum.textContent = title;

    sec.appendChild(sum);
    container.appendChild(sec);

    return sec;
  }

  flat.forEach(({ key, value, parent, path }) => {  

    if (!toggleOx.checked && path.includes("AIOx")) return;
    if (!toggleRun.checked && path.includes("RunningUnits")) return;

    const sectionName = Object.keys(activeSections || {}).find(s =>
    activeSections[s].includes(path)
    );

    if (sectionName && (!currentSection || currentSection.dataset.name !== sectionName)) {
      currentSection = startSection(sectionName);
      currentSection.dataset.name = sectionName;
    }

    const field = createField(key, value, parent);
    if (!field) return;

    if (activeGroupBreaks.includes(key)) {
      field.classList.add("sectionDivider");
    }

    if (currentSection) {
      currentSection.appendChild(field);
    } else {
      container.appendChild(field);
    }
  });
}

function render(){
  const c = document.getElementById("form");
  c.innerHTML = "";
  buildForm(data, c);
}

function expandAll() {
  document.querySelectorAll("#form details").forEach(d => {
    d.open = true;
  });
}

function collapseAll() {
  document.querySelectorAll("#form details").forEach(d => {
    d.open = false;
  });
}

async function loadFile() {
  const result = await window.electronAPI.openFile();
  if (!result) return;

  const { content, path } = result;

  try {
    data = JSON.parse(content);

const unknownKeys = findUnknownKeys(activeTemplate, data);

if (unknownKeys.length > 0) {
  alert(
    "Unknown parameters found:\n\n" +
    unknownKeys.join("\n")
  );
}

data = renameKeysPreserveOrder(data);

data = applyTemplateOrder(activeTemplate, data);

  } catch (err) {
    alert("Invalid JSON");
    console.error(err);
    return;
  }

  mergeDefaults(data, activeTemplate);

  currentFilePath = path;

  updateFilePathDisplay();

  render();
}

function renameKeysPreserveOrder(obj) {
  if (!obj || typeof obj !== "object") return obj;

  const newObj = {};

  for (const key of Object.keys(obj)) {
    let newKey = legacyKeyMap[key] || key;

    let value = obj[key];

    if (typeof value === "object" && value !== null) {
      value = renameKeysPreserveOrder(value);
    }

    if (!(newKey in newObj)) {
      newObj[newKey] = value;
    }
  }

  return newObj;
}

function applyTemplateOrder(activeTemplate, data) {
  if (typeof activeTemplate !== "object" || activeTemplate === null) {
    return data;
  }

  const result = {};

  for (const key of Object.keys(activeTemplate)) {
    if (data && key in data) {
      if (
        typeof activeTemplate[key] === "object" &&
        activeTemplate[key] !== null
      ) {
        result[key] = applyTemplateOrder(activeTemplate[key], data[key]);
      } else {
        result[key] = data[key];
      }
    } else {
      result[key] = JSON.parse(JSON.stringify(activeTemplate[key]));
    }
  }

  for (const key of Object.keys(data || {})) {
    if (!(key in result)) {
      result[key] = data[key];
    }
  }

  return result;
}

function findUnknownKeys(activeTemplate, data, path = "") {
  let unknown = [];

  if (!data || typeof data !== "object") return unknown;

  for (const key of Object.keys(data)) {
    const currentPath = path ? `${path}.${key}` : key;

    const isInTemplate = activeTemplate && key in activeTemplate;
    const isLegacyKey = key in legacyKeyMap;

    if (!isInTemplate && !isLegacyKey) {
      unknown.push(currentPath);
    }

    if (
      typeof data[key] === "object" &&
      data[key] !== null
    ) {
      const subTemplate = activeTemplate ? activeTemplate[key] : undefined;
      unknown.push(...findUnknownKeys(subTemplate, data[key], currentPath));
    }
  }

  return unknown;
}

function prepareOutputData() {
  let output = JSON.parse(JSON.stringify(data));

  if (!toggleOx.checked) {
    Object.keys(output.aic).forEach(k => {
      if (k.startsWith("AIOx")) delete output.aic[k];
    });
  }

  if (!toggleRun.checked) {
    Object.keys(output.aic).forEach(k => {
      if (k.startsWith("RunningUnits")) delete output.aic[k];
    });
  }

  return output;
}

async function quickSaveFile() {
  const btn = document.getElementById("saveBtn");
  const originalText = btn.textContent;

  const output = JSON.stringify(prepareOutputData(), null, 2);

  if (!currentFilePath) {
    await saveFile();
    return;
  }

  
  btn.textContent = "Saving...";
  btn.disabled = true;

  try {
    await window.electronAPI.quickSaveFile({
    path: currentFilePath,
    content: output
    });

    
    btn.textContent = "Saved!";

    setTimeout(() => {
      btn.textContent = originalText;
      btn.disabled = false;
    }, 1500);

  } catch (e) {
    btn.textContent = "Error!";
    setTimeout(() => {
      btn.textContent = originalText;
      btn.disabled = false;
    }, 2000);
  }
}

async function saveFile() {
  const output = prepareOutputData();
  const content = JSON.stringify(output, null, 2);

  const newPath = await window.electronAPI.saveFile(content);

  if (!newPath) return;

  currentFilePath = newPath;
  updateFilePathDisplay();
}

function updateFilePathDisplay() {
  const el = document.getElementById("filePath");

  if (!currentFilePath) {
    el.textContent = "No file loaded";
    el.style.fontSize = "12px";
    return;
  }

  const parts = currentFilePath.split(/[\\/]/);
  const separator = currentFilePath.includes("\\") ? "\\" : "/";

  const lastParts = parts.length > 5 ? parts.slice(-5) : parts;
  const shortPath = parts.length > 5
    ? "..." + lastParts.join(separator)
    : currentFilePath;

  el.textContent = shortPath;
  el.title = currentFilePath;
  el.style.fontSize = "12px";
}

toggleOx.onchange=render;
toggleRun.onchange=render;
</script>
</body>
</html>
